name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check whether this push is already released
        id: release_check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            latest_release_tag="$(git describe --tags --abbrev=0 --match 'v*' HEAD 2>/dev/null || true)"
            if [[ -n "$latest_release_tag" ]] && git merge-base --is-ancestor "$GITHUB_SHA" "$latest_release_tag"; then
              echo "This push is already included in $latest_release_tag; no additional release is needed."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "released_tag=$latest_release_tag" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Check whether a completed tag still needs publishing
        if: steps.release_check.outputs.released_tag != ''
        id: tagged_publish
        shell: bash
        run: |
          version="${{ steps.release_check.outputs.released_tag }}"
          version="${version#v}"
          if npm view "eqoa-data@$version" version >/dev/null 2>&1; then
            echo "${{ steps.release_check.outputs.released_tag }} is already published on npm."
            echo "needs_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "${{ steps.release_check.outputs.released_tag }} is not published on npm; retrying publication from its tag."
            git checkout "${{ steps.release_check.outputs.released_tag }}"
            echo "needs_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.release_check.outputs.should_release == 'true' || steps.tagged_publish.outputs.needs_publish == 'true'
        run: npm ci

      # Generate contributors + data (NO version bump yet)

      - name: Generate contributors and build artifacts
        if: steps.release_check.outputs.should_release == 'true'
        run: npm run build:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git user
        if: steps.release_check.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit generated changes (if any)
        if: steps.release_check.outputs.should_release == 'true'
        run: |
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: refresh generated content [skip ci]"
          fi

      # Bump version

      - name: Bump patch version
        if: steps.release_check.outputs.should_release == 'true'
        run: |
          npm version patch -m "chore(release): %s [skip ci]"

      # Build final artifacts AFTER version bump

      - name: Build final artifacts
        if: steps.release_check.outputs.should_release == 'true'
        run: npm run build

      # Reserve the version in git before making it immutable on npm.

      - name: Push release commit and tag
        if: steps.release_check.outputs.should_release == 'true'
        id: push_release
        shell: bash
        run: |
          if git push --atomic origin HEAD:main --follow-tags; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main
          if [[ "$(git rev-parse origin/main)" != "${{ steps.release_check.outputs.base_sha }}" ]]; then
            echo "main advanced while this release was building; a newer push will release the current branch state."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "The atomic release push failed without main advancing."
          exit 1

      # Publish only after the version commit and tag are established on main.

      - name: Publish to npm
        if: steps.push_release.outputs.pushed == 'true' || steps.tagged_publish.outputs.needs_publish == 'true'
        run: npm publish
